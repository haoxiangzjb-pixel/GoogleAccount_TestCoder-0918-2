---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      ansible.builtin.service:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: Service restarted notification

  handlers:
    - name: Service restarted notification
      ansible.builtin.debug:
        msg: "The service {{ service_name | default('nginx') }} has been restarted successfully"