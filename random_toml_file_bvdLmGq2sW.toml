# Application Configuration

[app]
name = "MyAwesomeApp"
version = "1.0.0"
debug = false

[server]
host = "0.0.0.0"
port = 8080
timeout = 30

[database]
host = "localhost"
port = 5432
name = "myapp_db"
username = "db_user"
password = "db_password"
pool_size = 10

[logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file = "app.log"

[features]
enable_cache = true
cache_ttl = 3600
enable_metrics = true