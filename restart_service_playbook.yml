---
- name: Restart a service
  hosts: all
  become: yes
  tasks:
    - name: Restart service
      systemd:
        name: "{{ service_name }}"
        state: restarted
      notify: wait for service

    - name: Wait for service to be ready
      wait_for:
        port: "{{ service_port | default(80) }}"
        host: "{{ ansible_host }}"
        delay: 5
        timeout: 300
      delegate_to: localhost

  handlers:
    - name: wait for service
      wait_for:
        port: "{{ service_port | default(80) }}"
        host: "{{ ansible_host }}"
        delay: 5
        timeout: 300
      delegate_to: localhost