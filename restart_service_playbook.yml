---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      ansible.builtin.systemd:
        name: "{{ service_name | default('httpd') }}"
        state: restarted
      notify: Wait for service to be active

    - name: Ensure service is enabled
      ansible.builtin.systemd:
        name: "{{ service_name | default('httpd') }}"
        enabled: yes

  handlers:
    - name: Wait for service to be active
      ansible.builtin.wait_for:
        path: /var/run/{{ service_name | default('httpd') }}.pid
        state: present
        timeout: 30