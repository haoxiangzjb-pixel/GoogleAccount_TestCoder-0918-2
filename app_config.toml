# Application Configuration
title = "My Application Configuration"

[database]
host = "localhost"
port = 5432
username = "admin"
password = "secret123"
database_name = "myapp_db"

[server]
host = "0.0.0.0"
port = 8080
debug = true
log_level = "info"

[features]
enable_caching = true
max_connections = 100
timeout_seconds = 30

[authentication]
jwt_secret = "your-jwt-secret-key"
token_expiry_hours = 24

[logging]
level = "info"
file = "app.log"
max_size_mb = 10
max_backups = 5