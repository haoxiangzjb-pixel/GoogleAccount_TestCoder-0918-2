# Application Configuration
[app]
name = "My Application"
version = "1.0.0"
debug = true

[database]
host = "localhost"
port = 5432
username = "admin"
password = "secure_password"
database_name = "my_app_db"

[server]
host = "0.0.0.0"
port = 8080
timeout = 30

[logging]
level = "info"
file = "app.log"

[features]
enable_cache = true
max_connections = 100