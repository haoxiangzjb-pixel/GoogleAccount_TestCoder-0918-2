# Application Configuration

[server]
host = "localhost"
port = 8080
debug = true

[database]
host = "localhost"
port = 5432
name = "myapp"
user = "dbuser"
password = "dbpassword"

[logging]
level = "INFO"
file = "/var/log/myapp.log"

[features]
enable_cache = true
cache_ttl = 3600
max_connections = 100