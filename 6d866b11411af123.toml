# Application Configuration
title = "My Application Configuration"

[database]
host = "localhost"
port = 5432
username = "admin"
password = "secret"
database_name = "myapp_db"

[server]
host = "0.0.0.0"
port = 8080
debug = true
log_level = "info"

[authentication]
jwt_secret = "your-jwt-secret-key"
token_expiry = 3600

[features]
enable_cache = true
max_connections = 100
timeout_seconds = 30