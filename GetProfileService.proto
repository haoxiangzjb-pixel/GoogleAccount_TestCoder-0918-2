syntax = "proto3";

package profile;

// Service to get user profile
service GetProfileService {
  // RPC method to get profile by user ID
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}

// Request message for GetProfile
message GetProfileRequest {
  string user_id = 1;
}

// Response message for GetProfile
message GetProfileResponse {
  string user_id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
}