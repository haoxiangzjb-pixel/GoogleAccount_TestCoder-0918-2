# App Configuration Settings

[server]
host = "localhost"
port = 8080
debug = false

[database]
host = "db.example.com"
port = 5432
name = "myapp_db"
user = "db_user"
password = "secure_password"
timeout = 30

[features]
enable_logging = true
max_connections = 100
rate_limit = 1000

[security]
secret_key = "super_secret_key_here"
allowed_hosts = ["localhost", "127.0.0.1"]
use_https = true