syntax = "proto3";

package profile;

// Определение сообщения профиля
message Profile {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string avatar_url = 4;
  int32 age = 5;
  string bio = 6;
}

// Запрос на получение профиля
message GetProfileRequest {
  string user_id = 1;
}

// Ответ с профилем
message GetProfileResponse {
  bool success = 1;
  string message = 2;
  Profile profile = 3;
}

// Определение сервиса
service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}