syntax = "proto3";

package profile;

service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (ProfileResponse);
  rpc UpdateProfile (UpdateProfileRequest) returns (ProfileResponse);
}

message GetProfileRequest {
  string user_id = 1;
}

message UpdateProfileRequest {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string avatar_url = 5;
}

message ProfileResponse {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string avatar_url = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}