syntax = "proto3";

package profile;

// Service for retrieving user profiles
service ProfileService {
  // Get a user's profile by their ID
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}

// Request message for GetProfile
message GetProfileRequest {
  string user_id = 1;
}

// Response message for GetProfile
message GetProfileResponse {
  // The user profile data
  Profile profile = 1;
}

// Message representing a user's profile
message Profile {
  string id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
}