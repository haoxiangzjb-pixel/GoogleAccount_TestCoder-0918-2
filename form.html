<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单表单</title>
</head>
<body>
    <h2>输入信息表单</h2>
    <form action="#" method="post">
        <div>
            <label for="inputField">输入内容:</label>
            <input type="text" id="inputField" name="inputField" required>
        </div>
        <br>
        <button type="submit">提交</button>
    </form>
</body>
</html>
