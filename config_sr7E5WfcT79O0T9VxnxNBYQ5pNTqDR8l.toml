# Конфигурационный файл приложения

[server]
host = "0.0.0.0"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp_db"
user = "myapp_user"
password = "myapp_password"
sslmode = "require"

[logging]
level = "INFO"
format = "json"

[features]
enable_cache = true
cache_ttl = 300
rate_limiting = true
max_requests_per_minute = 1000