syntax = "proto3";

package profile;

// Определение сообщения для профиля пользователя
message Profile {
  string user_id = 1;
  string username = 2;
  string email = 3;
  string full_name = 4;
  int32 age = 5;
  string avatar_url = 6;
}

// Определение сообщения для запроса получения профиля
message GetProfileRequest {
  string user_id = 1;
}

// Определение сообщения для ответа на запрос получения профиля
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string error_message = 3;
}

// Определение сервиса
service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}