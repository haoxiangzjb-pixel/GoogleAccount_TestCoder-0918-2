---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      systemd:
        name: "{{ service_name | default('apache2') }}"
        state: restarted
      notify: Wait for service to be active

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

  handlers:
    - name: Wait for service to be active
      wait_for:
        timeout: 30