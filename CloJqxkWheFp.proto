syntax = "proto3";

package profile;

// Сообщение, представляющее профиль пользователя
message Profile {
  string id = 1;
  string username = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  string bio = 6;
  string avatar_url = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

// Запрос на получение профиля
message GetProfileRequest {
  string user_id = 1;
}

// Ответ с профилем
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string error_message = 3;
}

// Основной сервис для работы с профилями
service ProfileService {
  // Метод для получения профиля пользователя
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
}