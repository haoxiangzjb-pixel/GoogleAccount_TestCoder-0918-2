# Application Configuration

[server]
host = "0.0.0.0"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp"
user = "dbuser"
password = "dbpassword"

[logging]
level = "INFO"
file = "/var/log/myapp.log"

[features]
enable_auth = true
enable_cache = true
cache_ttl = 3600