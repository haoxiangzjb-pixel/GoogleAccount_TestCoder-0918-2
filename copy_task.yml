---
# Ansible task to copy a file and save with a random name
- name: Copy file with random name
  hosts: localhost
  tasks:
    - name: Copy file with random name
      copy:
        src: /workspace/source_file.txt
        dest: "/tmp/file_{{ 1000000 | random(seed=inventory_hostname) }}.txt"
        mode: '0644'
      register: copy_result

    - name: Display the new file name
      debug:
        msg: "File copied to {{ copy_result.dest }}"