---
# Ansible task to copy a file and save it with a random name
- name: Copy file with random name
  hosts: localhost
  tasks:
    - name: Copy file with random name
      copy:
        src: /workspace/first.txt
        dest: "/tmp/copy_{{ 999999 | random | to_uuid }}.txt"
      register: copy_result

    - name: Display the new file name
      debug:
        msg: "File copied to {{ copy_result.dest }}"