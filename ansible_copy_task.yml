---
- name: Copy file with random name
  hosts: localhost
  connection: local
  tasks:
    - name: Generate random suffix for filename
      set_fact:
        random_suffix: "{{ 10000 | random }}"
      
    - name: Copy file with random name
      copy:
        src: /workspace/sample.txt
        dest: /workspace/copied_file_{{ random_suffix }}.txt
      register: copy_result
      
    - name: Print the name of the copied file
      debug:
        msg: "File copied to {{ copy_result.dest }}"