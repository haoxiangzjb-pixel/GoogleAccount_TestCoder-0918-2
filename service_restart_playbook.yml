---
- name: Restart specified service
  hosts: all
  become: true
  vars:
    service_name: apache2
  tasks:
    - name: Restart the {{ service_name }} service
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      notify: Service restarted notification

  handlers:
    - name: Service restarted notification
      ansible.builtin.debug:
        msg: "The service {{ service_name }} has been restarted successfully"