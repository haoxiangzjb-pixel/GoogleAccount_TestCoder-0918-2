# Application Configuration

[server]
host = "0.0.0.0"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp"
user = "dbuser"
password = "dbpassword"
ssl_mode = "require"

[cache]
provider = "redis"
host = "localhost"
port = 6379
ttl = 3600

[features]
enable_logging = true
max_connections = 100
rate_limit = 1000